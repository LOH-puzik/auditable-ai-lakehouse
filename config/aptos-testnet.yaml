# Aptos testnet overrides. Inherits everything else from default.yaml.

environment: aptos-testnet

mlflow:
  registered_model_name: audit_lakehouse_isolation_forest
  promotion_thresholds:
    precision: 0.0
    recall: 0.0
    precision_at_k: 0.0

anchoring:
  node_url: https://fullnode.testnet.aptoslabs.com/v1
  faucet_url: https://faucet.testnet.aptoslabs.com
  batch_size: 100
  max_gas_amount: 10000
  gas_unit_price: 100
  module_name: merkle_registry
  function_name: store_merkle_root
  event_name: MerkleRootStored
  # account_address: optional; normally derived from AUDIT_LAKEHOUSE_ANCHORING_PRIVATE_KEY
  # module_address: optional; defaults to account_address when the Move package is published there
