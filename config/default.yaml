# Default configuration. Overridden by:
#   - config/aptos-devnet.yaml (when anchoring to Aptos devnet)
#   - environment variables (prefix AUDIT_LAKEHOUSE_, nested with __)
#   - .env file (gitignored)
#
# Secrets must come from environment variables, never YAML:
#   AUDIT_LAKEHOUSE_ANCHORING_PRIVATE_KEY

environment: dev
seed: 42

paths:
  bronze: /Volumes/main/audit/bronze
  silver: /Volumes/main/audit/silver
  silver_quarantine: /Volumes/main/audit/silver_quarantine
  gold: /Volumes/main/audit/gold
  governance_events: /Volumes/main/audit/governance_events

mlflow:
  tracking_uri: databricks
  experiment_name: /Shared/audit_lakehouse/isolation_forest
  registered_model_name: audit_lakehouse_isolation_forest
  promotion_thresholds:
    precision: 0.80
    recall: 0.70
    precision_at_k: 0.85

anchoring:
  node_url: https://fullnode.devnet.aptoslabs.com/v1
  faucet_url: https://faucet.devnet.aptoslabs.com
  account_address: ""
  module_address: ""
  module_name: merkle_registry
  function_name: store_merkle_root
  event_name: MerkleRootStored
  batch_size: 100
  max_gas_amount: 10000
  gas_unit_price: 100

governance:
  approver: thesis_prototype_approver
  deployer: thesis_prototype_deployer
